apiVersion: v1
kind: LLMAPIRequester
metadata:
  name: doubao-chat-completions
  label:
    en_US: ByteDance Doubao
    zh_Hans: 字节豆包
  icon: doubao.svg
spec:
  litellm_provider: openai
  config:
  - name: base_url
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    type: string
    required: true
    default: https://ark.cn-beijing.volces.com/api/v3
  - name: timeout
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    type: integer
    required: true
    default: 120
  alias: "doubao 豆包 字节 字节跳动 bytedance volcengine 火山 火山引擎 ark 方舟 seed"
  support_type:
  - llm
  - text-embedding
  - rerank
  provider_category: manufacturer
