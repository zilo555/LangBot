apiVersion: v1
kind: LLMAPIRequester
metadata:
  name: litellm-chat
  label:
    en_US: LiteLLM (Unified)
    zh_Hans: LiteLLM (统一请求器)
  icon: litellm.svg
spec:
  config:
  - name: base_url
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    type: string
    required: false
    default: ''
  - name: timeout
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    type: integer
    required: true
    default: 120
  - name: custom_llm_provider
    label:
      en_US: Custom Provider
      zh_Hans: 自定义 Provider
    type: string
    required: false
    default: ''
    description:
      en_US: Force provider type (e.g., anthropic, openai, gemini)
      zh_Hans: 强制指定 provider 类型（如 anthropic, openai, gemini）
  - name: drop_params
    label:
      en_US: Drop Unsupported Params
      zh_Hans: 丢弃不支持参数
    type: boolean
    required: false
    default: false
  - name: num_retries
    label:
      en_US: Number of Retries
      zh_Hans: 重试次数
    type: integer
    required: false
    default: 0
  - name: api_version
    label:
      en_US: API Version
      zh_Hans: API 版本
    type: string
    required: false
    default: ''
  alias: "litellm LiteLLM 通用 universal 万能 兼容 compatible proxy 代理 中转"
  support_type:
  - llm
  - text-embedding
  - rerank
  provider_category: unified
execution:
  python:
    path: ./litellmchat.py
    attr: LiteLLMRequester