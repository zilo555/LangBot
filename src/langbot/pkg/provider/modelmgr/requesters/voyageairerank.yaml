apiVersion: v1
kind: LLMAPIRequester
metadata:
  name: voyageai-rerank
  label:
    en_US: Voyage AI
    zh_Hans: Voyage AI
  icon: voyageai.svg
spec:
  litellm_provider: openai
  config:
  - name: base_url
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    type: string
    required: true
    default: https://api.voyageai.com/v1
  - name: timeout
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    type: integer
    required: true
    default: 120
  alias: "voyage voyageai voyage-ai VoyageAI rerank 重排 reranker voyage-rerank embedding"
  support_type:
  - rerank
  provider_category: manufacturer
execution:
  python:
    path: ./chatcmpl.py
    attr: OpenAIChatCompletions
