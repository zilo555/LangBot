apiVersion: v1
kind: LLMAPIRequester
metadata:
  name: groq-chat-completions
  label:
    en_US: Groq
    zh_Hans: Groq
  icon: groq.svg
spec:
  litellm_provider: groq
  config:
  - name: base_url
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    type: string
    required: true
    default: https://api.groq.com/openai/v1
  - name: timeout
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    type: integer
    required: true
    default: 120
  alias: "groq Groq 高速 llama mixtral 推理加速 lpu"
  support_type:
  - llm
  provider_category: manufacturer
