apiVersion: v1
kind: LLMAPIRequester
metadata:
  name: together-chat-completions
  label:
    en_US: Together AI
    zh_Hans: Together AI
  icon: together.svg
spec:
  litellm_provider: together_ai
  config:
  - name: base_url
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    type: string
    required: true
    default: https://api.together.xyz/v1
  - name: timeout
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    type: integer
    required: true
    default: 120
  alias: "together Together together-ai togetherai 中转 llama qwen bge rerank embedding"
  support_type:
  - llm
  - text-embedding
  - rerank
  provider_category: manufacturer
