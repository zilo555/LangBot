apiVersion: v1
kind: LLMAPIRequester
metadata:
  name: cohere-rerank
  label:
    en_US: Cohere
    zh_Hans: Cohere
  icon: cohere.svg
spec:
  config:
  - name: base_url
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    type: string
    required: true
    default: https://api.cohere.com/v2
  - name: timeout
    label:
      en_US: Timeout
      zh_Hans: 超时时间
    type: integer
    required: true
    default: 120
  support_type:
  - rerank
  provider_category: manufacturer
execution:
  python:
    path: ./chatcmpl.py
    attr: OpenAIChatCompletions
