apiVersion: v1
kind: MessagePlatformAdapter
metadata:
  name: wecombot
  label:
    en_US: WeComBot
    zh_Hans: 企业微信智能机器人
  description:
    en_US: WeComBot Adapter
    zh_Hans: 企业微信智能机器人适配器，请查看文档了解使用方式
  icon: wecombot.png
spec:
  config:
    - name: BotId
      label:
        en_US: BotId
        zh_Hans: 机器人ID (BotId)
      type: string
      required: true
      default: ""
    - name: robot_name
      label:
        en_US: Robot Name
        zh_Hans: 机器人名称
      type: string
      required: true
      default: ""
    - name: enable-webhook
      label:
        en_US: Enable Webhook Mode
        zh_Hans: 启用Webhook模式
      description:
        en_US: If enabled, the bot will use webhook mode to receive messages. Otherwise, it will use WS long connection mode
        zh_Hans: 如果启用，机器人将使用 Webhook 模式接收消息。否则，将使用 WS 长连接模式
      type: boolean
      required: true
      default: false
    - name: Secret
      label:
        en_US: Secret
        zh_Hans: 机器人密钥 (Secret)
      description:
        en_US: Required for WebSocket long connection mode
        zh_Hans: 使用 WS 长连接模式时必填
      type: string
      required: false
      default: ""
    - name: Corpid
      label:
        en_US: Corpid
        zh_Hans: 企业ID
      description:
        en_US: Required for Webhook mode
        zh_Hans: 使用 Webhook 模式时必填
      type: string
      required: false
      default: ""
    - name: Token
      label:
        en_US: Token
        zh_Hans: 令牌 (Token)
      description:
        en_US: Required for Webhook mode
        zh_Hans: 使用 Webhook 模式时必填
      type: string
      required: false
      default: ""
    - name: EncodingAESKey
      label:
        en_US: EncodingAESKey
        zh_Hans: 消息加解密密钥 (EncodingAESKey)
      description:
        en_US: Required for Webhook mode. Optional for WebSocket mode (used for file decryption)
        zh_Hans: 使用 Webhook 模式时必填。WebSocket 模式下可选（用于文件解密）
      type: string
      required: false
      default: ""
execution:
  python:
    path: ./wecombot.py
    attr: WecomBotAdapter
