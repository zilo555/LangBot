apiVersion: v1
kind: MessagePlatformAdapter
metadata:
  name: discord
  label:
    en_US: Discord
    zh_Hans: Discord
    zh_Hant: Discord
    ja_JP: Discord
  description:
    en_US: Discord Adapter
    zh_Hans: Discord 适配器，需要可连接 Discord 服务器的网络环境
    zh_Hant: Discord 適配器，需要可連線 Discord 伺服器的網路環境
    ja_JP: Discord アダプター、Discord サーバーに接続可能なネットワーク環境が必要です
  icon: discord.svg
spec:
  categories:
    - popular
    - global
  config:
    - name: client_id
      label:
        en_US: Client ID
        zh_Hans: 客户端ID
        zh_Hant: 用戶端ID
        ja_JP: クライアント ID
      type: string
      required: true
      default: ""
    - name: token
      label:
        en_US: Token
        zh_Hans: 令牌
        zh_Hant: 令牌
        ja_JP: トークン
      type: string
      required: true
      default: ""
execution:
  python:
    path: ./discord.py
    attr: DiscordAdapter
