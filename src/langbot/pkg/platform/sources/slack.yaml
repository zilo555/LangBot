apiVersion: v1
kind: MessagePlatformAdapter
metadata:
  name: slack
  label:
    en_US: Slack
    zh_Hans: Slack
  description:
    en_US: Slack Adapter
    zh_Hans: Slack 适配器，需要公网地址以接收 Slack 消息推送，请查看文档了解使用方式
    ja_JP: Slack アダプター、Slackのメッセージプッシュを受信するためにパブリックURLが必要です。使用方法の詳細については、ドキュメントを参照してください。
    zh_Hant: Slack 适配器，需要公网地址以接收 Slack 消息推送，请查看文档了解使用方式
  icon: slack.png
spec:
  config:
    - name: webhook_url
      label:
        en_US: Webhook Callback URL
        zh_Hans: Webhook 回调地址
      description:
        en_US: Copy this URL and paste it into your Slack app's event subscription configuration
        zh_Hans: 复制此地址并粘贴到 Slack 应用的事件订阅配置中
      type: webhook-url
      required: false
      default: ""
    - name: bot_token
      label:
        en_US: Bot Token
        zh_Hans: 机器人令牌
      type: string
      required: true
      default: ""
    - name: signing_secret
      label:
        en_US: signing_secret
        zh_Hans: 密钥
      type: string
      required: true
      default: ""
execution:
  python:
    path: ./slack.py
    attr: SlackAdapter