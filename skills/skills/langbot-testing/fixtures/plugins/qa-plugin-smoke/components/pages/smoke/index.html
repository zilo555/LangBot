<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smoke Page</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--langbot-bg, #ffffff);
        color: var(--langbot-text, #111827);
      }
      main {
        max-width: 560px;
      }
      code {
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(56, 189, 248, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Smoke Page</h1>
      <p id="sentinel">qa-plugin-smoke-page</p>
      <p id="api-result">waiting</p>
    </main>
    <script src="/api/v1/plugins/_sdk/page-sdk.js"></script>
    <script>
      langbot.onReady(async function () {
        try {
          const data = await langbot.api("/ping", { source: "iframe" }, "POST");
          document.getElementById("api-result").textContent = data.sentinel || "missing sentinel";
        } catch (error) {
          document.getElementById("api-result").textContent = String(error && error.message || error);
        }
      });
    </script>
  </body>
</html>
