apiVersion: v1
kind: Tool
metadata:
  name: qa_echo
  label:
    en_US: QA Echo
    zh_Hans: QA 回显
  description:
    en_US: Echoes deterministic text for plugin smoke testing.
    zh_Hans: 为插件冒烟测试回显确定性文本。
spec:
  parameters:
    type: object
    properties:
      text:
        type: string
        description: Text to echo.
    required:
      - text
  llm_prompt: Echo deterministic text for plugin smoke testing.
execution:
  python:
    path: qa_echo.py
    attr: QAEchoTool
